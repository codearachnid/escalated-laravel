name: escalated-laravel tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout escalated-laravel
        uses: actions/checkout@v4
        with:
          path: escalated-laravel

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Create Laravel host application
        run: composer create-project laravel/laravel laravel --no-interaction

      - name: Install escalated-laravel into host
        working-directory: laravel
        run: |
          composer config repositories.escalated path ../escalated-laravel
          composer require escalated-dev/escalated-laravel:@dev --no-interaction

      - name: Install package test dependencies
        working-directory: laravel
        run: |
          composer require orchestra/testbench:^10.0 inertiajs/inertia-laravel:^2.0 --dev --no-interaction

      - name: Register package test autoloading
        working-directory: laravel
        run: |
          php -r "
            \$c = json_decode(file_get_contents('composer.json'), true);
            \$c['autoload-dev']['psr-4']['Escalated\\\\Laravel\\\\Tests\\\\'] = '../escalated-laravel/tests/';
            \$c['autoload-dev']['psr-4']['Escalated\\\\Laravel\\\\Database\\\\Factories\\\\'] = '../escalated-laravel/database/factories/';
            file_put_contents('composer.json', json_encode(\$c, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          "
          composer dump-autoload

      - name: Run escalated package tests
        working-directory: laravel
        run: vendor/bin/pest ../escalated-laravel/tests
